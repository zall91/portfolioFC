<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | François CAMON - BTS SIO SISR</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        /* Style pour le scroll de la modale */
        #modalContent::-webkit-scrollbar { width: 8px; }
        #modalContent::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="fixed w-full bg-[#161b22]/90 backdrop-blur-md z-50 border-b border-gray-800 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-bold text-xl">François <span class="text-blue-500">CAMON</span></span>
            <div class="space-x-8 text-sm font-medium">
                <a href="#projets" class="hover:text-blue-400">RÉALISATIONS</a>
                <a href="#contact" class="bg-blue-600 px-4 py-2 rounded-md">CONTACT</a>
            </div>
        </div>
    </nav>

    <header class="h-screen flex flex-col justify-center items-center hero-gradient px-6">
        <div data-aos="zoom-out" class="text-center">
            <h1 class="text-5xl md:text-7xl font-black mb-4 uppercase">Portfolio <span class="text-blue-600">SISR</span></h1>
            <p class="text-gray-400 text-lg md:text-2xl max-w-2xl mx-auto">Solutions d'Infrastructure, Systèmes et Réseaux.</p>
        </div>
    </header>

    <section id="projets" class="py-20 max-w-5xl mx-auto px-6">
        <h2 class="text-3xl font-bold mb-12 border-l-4 border-blue-600 pl-4" data-aos="fade-right">Mes Projets Techniques</h2>
        <div id="liste-projets" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <p class="text-blue-400 animate-pulse">Connexion à GitHub...</p>
        </div>
    </section>

    <div id="modalProjet" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#161b22] max-w-4xl w-full max-h-[90vh] overflow-y-auto rounded-2xl border border-gray-700 p-8 relative shadow-2xl">
            <button onclick="fermerModal()" class="fixed top-6 right-6 bg-blue-600 hover:bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center z-[110]">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });

        // 1. Charger les projets depuis GitHub
        async function chargerProjets() {
            const container = document.getElementById('liste-projets');
            try {
                const response = await fetch('https://api.github.com/repos/zall91/portfolioFC/contents/projets?t=' + Date.now());
                const files = await response.json();
                container.innerHTML = '';

                for (let file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const content = await res.text();
                        
                        const title = content.match(/title: (.*)/)?.[1] || "Projet SISR";
                        const image = content.match(/image: (.*)/)?.[1] || "";
                        const category = content.match(/category: (.*)/)?.[1] || "Technique";
                        const body = content.split('---').pop().trim();

                        container.innerHTML += `
                            <div onclick="ouvrirProjet('${file.name}')" class="bg-[#161b22] p-8 rounded-xl border border-gray-800 hover:border-blue-500 transition group cursor-pointer shadow-lg" data-aos="fade-up">
                                ${image ? `<img src="${image}" class="w-full h-32 object-contain mb-4">` : ''}
                                <span class="text-blue-500 text-xs font-bold uppercase">${category}</span>
                                <h3 class="text-2xl font-bold mt-2 group-hover:text-blue-400">${title}</h3>
                                <p class="mt-4 text-gray-400 text-sm line-clamp-3">${body.substring(0, 120)}...</p>
                                <span class="text-blue-400 text-xs mt-4 inline-block font-bold uppercase tracking-wider">Lire la suite →</span>
                            </div>
                        `;
                    }
                }
            } catch (e) {
                container.innerHTML = '<p class="text-red-400">Erreur de chargement. Vérifiez que le dépôt est Public.</p>';
            }
        }

        // 2. Ouvrir la modale
        async function ouvrirProjet(fileName) {
            const modal = document.getElementById('modalProjet');
            const contentDiv = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            contentDiv.innerHTML = '<p class="text-blue-400">Chargement...</p>';

            try {
                const res = await fetch(`https://raw.githubusercontent.com/zall91/portfolioFC/main/projets/${fileName}`);
                const text = await res.text();
                const title = text.match(/title: (.*)/)?.[1] || "Détails";
                const image = text.match(/image: (.*)/)?.[1] || "";
                const body = text.split('---').pop().trim();

                contentDiv.innerHTML = `
                    ${image ? `<img src="${image}" class="w-full h-64 object-contain mb-8 rounded bg-black/20">` : ''}
                    <h2 class="text-4xl font-bold text-white mb-4">${title}</h2>
                    <div class="h-1 w-20 bg-blue-600 mb-8"></div>
                    <div class="text-gray-300 leading-relaxed text-lg whitespace-pre-wrap">${body}</div>
                `;
            } catch (e) {
                contentDiv.innerHTML = "Erreur de chargement du contenu.";
            }
        }

        function fermerModal() {
            document.getElementById('modalProjet').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Lancement au démarrage
        window.addEventListener('DOMContentLoaded', chargerProjets);

        // Netlify Identity
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
                }
            });
        }
    </script>
</body>
</html>
