<!DOCTYPE html>
<html lang="fr">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | François CAMON - BTS SIO SISR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body>

    <nav class="fixed w-full bg-[#161b22]/90 backdrop-blur-md z-50 border-b border-gray-800 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-bold text-xl tracking-tight">François <span class="text-blue-500">CAMON</span></span>
            <div class="space-x-8 text-sm font-medium">
                <a href="#projets" class="hover:text-blue-400 transition">RÉALISATIONS</a>
                <a href="#cv" class="hover:text-blue-400 transition">PARCOURS</a>
                <a href="#contact" class="bg-blue-600 px-4 py-2 rounded-md hover:bg-blue-500 transition">CONTACT</a>
            </div>
        </div>
    </nav>

    <header class="h-screen flex flex-col justify-center items-center hero-gradient px-6">
        <div data-aos="zoom-out" class="text-center">
            <h1 class="text-5xl md:text-7xl font-black mb-4 uppercase">Portfolio <span class="text-blue-600">SISR</span></h1>
            <p class="text-gray-400 text-lg md:text-2xl max-w-2xl mx-auto">
                Spécialiste en Solutions d'Infrastructure, Systèmes et Réseaux.
            </p>
        </div>
        <div class="mt-12 animate-bounce">
            <a href="#projets">↓ Scroll pour découvrir mon lab</a>
        </div>
    </header>

    <section id="projets" class="py-20 max-w-5xl mx-auto px-6">
    <h2 class="text-3xl font-bold mb-12 border-l-4 border-blue-600 pl-4" data-aos="fade-right">Mes Projets Techniques</h2>
    
    <div id="liste-projets" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <p class="text-gray-500">Chargement des projets...</p>
    </div>
</section>

<script>
    async function chargerProjets() {
        const container = document.getElementById('liste-projets');
        try {
            // On demande à GitHub la liste des fichiers dans le dossier projets
            const response = await fetch('https://api.github.com/repos/zall91/portfolioFC/contents/projets');
            const files = await response.json();
            
            container.innerHTML = ''; // On vide le message de chargement

            for (let file of files) {
                if (file.name.endsWith('.md')) {
                    const res = await fetch(file.download_url);
                    const content = await res.text();
                    
                    // Petit nettoyage pour extraire les infos du fichier créé par l'admin
                    const title = content.match(/title: (.*)/)?.[1] || "Sans titre";
                    const image = content.match(/image: (.*)/)?.[1] || "";
                    const category = content.match(/category: (.*)/)?.[1] || "SISR";
                    const body = content.split('---').pop().trim();
                    
                    // On injecte le HTML
                    container.innerHTML += `
    <div class="bg-[#161b22] p-8 rounded-xl border border-gray-800 hover:border-blue-500 transition group cursor-pointer" 
         onclick="ouvrirProjet('${file.name}')">
        ${image ? `<img src="${image}" class="w-full h-32 object-contain mb-4 rounded">` : ''}
        <span class="text-blue-500 text-xs font-bold uppercase tracking-widest">${category}</span>
        <h3 class="text-2xl font-bold mt-2 group-hover:text-blue-400">${title}</h3>
        <p class="mt-4 text-gray-400 text-sm">${body.substring(0, 100)}...</p>
        <span class="text-blue-400 text-xs mt-4 inline-block font-bold italic">Cliquez pour lire la suite →</span>
    </div>
`;
                }
            }
        } catch (e) {
            console.error("Erreur :", e);
            container.innerHTML = '<p>Erreur lors du chargement. Vérifiez votre dossier "projets" sur GitHub.</p>';
        }
    }
    // On attend 1 seconde que tout soit bien chargé
    setTimeout(chargerProjets, 1000);
</script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });
        if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
    </script>
</body>
</html>
