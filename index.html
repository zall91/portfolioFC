<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | François CAMON - BTS SIO SISR</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-blur: 12px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[60] border-b border-gray-800 glass p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="font-bold text-xl tracking-tighter uppercase">F.<span class="text-blue-500">CAMON</span></span>
            <div class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest">
                <a href="#" class="hover:text-blue-400">Accueil</a>
                <a href="#parcours" class="hover:text-blue-400">Parcours</a>
                <a href="#projets" class="hover:text-blue-400">Projets</a>
                <a href="#veille" class="hover:text-blue-400">Veille</a>
                <a href="#contact" class="bg-blue-600 px-4 py-2 rounded text-white hover:bg-blue-500 transition">Contact</a>
            </div>
        </div>
    </nav>

    <header class="h-screen flex flex-col justify-center items-center hero-gradient px-6">
        <div data-aos="fade-up" class="text-center">
            <h1 class="text-6xl md:text-8xl font-black mb-4 uppercase tracking-tighter">SISR <span class="text-blue-600">Expert</span></h1>
            <p class="text-gray-400 text-xl md:text-2xl max-w-2xl mx-auto font-light">Portfolio de François CAMON - Solutions d'Infrastructure, Systèmes et Réseaux.</p>
        </div>
        <a href="#parcours" class="mt-12 animate-bounce text-blue-500 font-bold">DÉCOUVRIR MON PROFIL ↓</a>
    </header>

    <section id="parcours" class="py-24 max-w-5xl mx-auto px-6">
        <h2 class="text-4xl font-black mb-12 border-l-8 border-blue-600 pl-6" data-aos="fade-right">MON PARCOURS</h2>
        <div id="liste-parcours" class="space-y-8 border-l-2 border-gray-800 ml-4">
            </div>
    </section>

    <section id="projets" class="py-24 bg-[#090c10]">
        <div class="max-w-5xl mx-auto px-6">
            <h2 class="text-4xl font-black mb-12 border-l-8 border-blue-600 pl-6 text-right" data-aos="fade-left">RÉALISATIONS</h2>
            <div id="liste-projets" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                </div>
        </div>
    </section>

    <section id="veille" class="py-24 max-w-5xl mx-auto px-6">
        <h2 class="text-4xl font-black mb-12 border-l-8 border-blue-600 pl-6" data-aos="fade-right">VEILLE TECHNOLOGIQUE</h2>
        <div id="liste-veille" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </section>

    <div id="modalProjet" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#161b22] max-w-4xl w-full max-h-[90vh] overflow-y-auto rounded-3xl border border-gray-700 p-10 relative shadow-2xl">
            <button onclick="fermerModal()" class="fixed top-8 right-8 bg-blue-600 hover:bg-blue-500 text-white w-12 h-12 rounded-full flex items-center justify-center z-[110] shadow-xl">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });

        // FONCTION GÉNÉRIQUE POUR CHARGER LES COLLECTIONS
        async function chargerCollection(dossier, elementId, templateFunc) {
            const container = document.getElementById(elementId);
            try {
                const response = await fetch(`https://api.github.com/repos/zall91/portfolioFC/contents/${dossier}?t=${Date.now()}`);
                const files = await response.json();
                if (!Array.isArray(files)) return;
                
                container.innerHTML = '';
                for (let file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const content = await res.text();
                        container.innerHTML += templateFunc(content, file.name);
                    }
                }
            } catch (e) { console.error(`Erreur ${dossier}:`, e); }
        }

        // TEMPLATES DE DESIGN
        const projTemplate = (c, name) => {
            const title = c.match(/title: (.*)/)?.[1] || "Projet";
            const img = c.match(/image: (.*)/)?.[1] || "";
            const body = c.split('---').pop().trim().substring(0, 100);
            return `<div onclick="ouvrirModale('${name}', 'projets')" class="bg-[#161b22] p-6 rounded-2xl border border-gray-800 hover:border-blue-500 transition-all cursor-pointer group shadow-xl">
                ${img ? `<img src="${img}" class="w-full h-40 object-contain mb-4 rounded-lg bg-black/20">` : ''}
                <h3 class="text-2xl font-bold group-hover:text-blue-400">${title}</h3>
                <p class="text-gray-400 mt-2 text-sm">${body}...</p>
                <span class="text-blue-500 text-xs font-bold mt-4 block uppercase tracking-widest">Voir le dossier →</span>
            </div>`;
        };

        const parcTemplate = (c) => {
            const year = c.match(/title: (.*)/)?.[1] || "";
            const school = c.match(/subtitle: (.*)/)?.[1] || "";
            const body = c.split('---').pop().trim();
            return `<div class="relative pl-8 mb-8" data-aos="fade-up">
                <div class="absolute left-[-9px] top-0 w-4 h-4 bg-blue-600 rounded-full border-4 border-[#0d1117]"></div>
                <span class="text-blue-500 font-black text-lg">${year}</span>
                <h3 class="text-xl font-bold text-white">${school}</h3>
                <div class="text-gray-400 mt-1">${body}</div>
            </div>`;
        };

        const veilleTemplate = (c) => {
            const title = c.match(/title: (.*)/)?.[1] || "Veille";
            const url = c.match(/url: (.*)/)?.[1] || "#";
            const body = c.split('---').pop().trim().substring(0, 80);
            return `<div class="bg-[#161b22] p-6 rounded-xl border border-gray-800">
                <h3 class="font-bold text-blue-400 mb-2">${title}</h3>
                <p class="text-gray-400 text-xs mb-4">${body}...</p>
                <a href="${url}" target="_blank" class="text-white text-[10px] font-bold bg-gray-800 px-3 py-1 rounded-full">LIRE LA SOURCE</a>
            </div>`;
        };

        // OUVERTURE MODALE
        async function ouvrirModale(fileName, dossier) {
            const contentDiv = document.getElementById('modalContent');
            document.getElementById('modalProjet').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            contentDiv.innerHTML = '<p class="text-blue-500 animate-pulse text-center py-20">Chargement...</p>';

            const res = await fetch(`https://raw.githubusercontent.com/zall91/portfolioFC/main/${dossier}/${fileName}`);
            const text = await res.text();
            const title = text.match(/title: (.*)/)?.[1] || "Détails";
            const body = text.split('---').pop().trim();

            contentDiv.innerHTML = `<h2 class="text-4xl font-black mb-6 text-white">${title}</h2>
                                    <div class="h-1 w-20 bg-blue-600 mb-8"></div>
                                    <div class="text-gray-300 text-lg leading-relaxed whitespace-pre-wrap">${body}</div>`;
        }

        function fermerModal() {
            document.getElementById('modalProjet').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // INIT
        window.onload = () => {
            chargerCollection('projets', 'liste-projets', projTemplate);
            chargerCollection('parcours', 'liste-parcours', parcTemplate);
            chargerCollection('veille', 'liste-veille', veilleTemplate);
        };
    </script>
</body>
</html>
    </script>
</body>
</html>
