backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "projets"
    label: "Mes Projets (PPE / Stages)"
    folder: "projets"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Infrastructure", "Sécurité", "Réseau", "Système"] }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Description courte", name: "description", widget: "string" }
      - { label: "Contenu complet", name: "body", widget: "markdown" }

  - name: "parcours"
    label: "Mon Parcours (CV / Diplômes)"
    folder: "parcours"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Année / Période", name: "title", widget: "string" }
      - { label: "Établissement / Entreprise", name: "subtitle", widget: "string" }
      - { label: "Détails", name: "body", widget: "markdown" }

  - name: "veille"
    label: "Veille Technologique"
    folder: "veille"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Sujet de veille", name: "title", widget: "string" }
      - { label: "Lien source", name: "url", widget: "string", required: false }
      - { label: "Résumé", name: "body", widget: "markdown" }
